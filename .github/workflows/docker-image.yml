name: Docker Image CI

on:
  release:
    types: [published]
env:
  RELEASE_TAG: ${{ github.event.release.tag_name }}
  LATEST_TAG: ${{ github.event.release.prerelease && 'prerelease' || 'latest' }}
  REPO_OWNER: zorrohq

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: true
        build-args: |
          SERVICE=backend-api
        tags: |
          ghcr.io/${{ env.REPO_OWNER }}/knight:${{ env.LATEST_TAG }}
          ghcr.io/${{ env.REPO_OWNER }}/knight:${{ env.RELEASE_TAG }}
