services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["fastapi", "run", "knight/api/app.py", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "knight.worker.celery_app:celery_app",
        "worker",
        "--loglevel=info",
        "--queues=knight.default",
      ]
    env_file:
      - .env.example
    depends_on:
      redis:
        condition: service_healthy
